  document.getElementById('ST').innerHTML=`<div style="margin-bottom:10px"><div class="pt" style="margin-bottom:6px">Assign roles — click the dots</div><div class="mr"><span class="ml" style="color:var(--t3)">Palette</span>${S.pl.map((ci,i)=>{const h=pH[i];return h?`<div style="text-align:center"><div class="ms" style="background:${h};cursor:default"></div><div style="font-size:var(--xs);color:var(--t3);width:26px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${pN[i].split(' ')[0]}</div></div>`:`<div><div class="ms" style="background:var(--b4);cursor:default"></div></div>`;}).join('')}</div>${mRow('60% Dom','d')}${mRow('30% Sec','s')}${mRow('10% Acc','a')}</div><div class="sg">${blk(dci,dr,dc,'60%','Dom','d',68)}${blk(sci,sr,sc,'30%','Sec','s',50)}${blk(aci,ar2,ac,'10%','Acc','a',32)}</div><div class="vr"><div class="pt" style="margin:0 0 6px;border:none;padding:0">Accent vibrance</div><div class="vp"><div class="vs" style="background:${ac}"></div><span style="font-size:var(--xs);color:var(--t3)">→</span><div class="vs" style="background:${va}"></div><div><div style="font-size:var(--xs);font-family:var(--m);color:var(--t2)">${va}</div><div style="font-size:var(--xs);color:var(--t3)">HSL-boosted · any hex</div></div></div><div style="display:flex;align-items:center;gap:6px;font-size:var(--sm);color:var(--t2)"><span>Vibrance</span><input type="range" min="0" max="100" value="${S.vb}" oninput="sVb(+this.value)" style="flex:1"><span style="font-family:var(--m)">${S.vb}%</span></div></div><div style="font-size:var(--xs);color:var(--t3);letter-spacing:.18em;text-transform:uppercase;margin-bottom:6px">UI preview</div>${mk}`;
}

function rWC(){
  const im=S.hm==='mo',mr=getMR(S.sp),{d,s,a}=S.ro;
  const dci=S.pl[d],sci=S.pl[s],aci=S.pl[a];
  const dr=im?mr[d]:gR('d'),sr=im?mr[s]:gR('s'),ar2=im?mr[a]:gR('a');
  document.getElementById('WC').innerHTML=`<div class="wg">${[{ci:dci,ri:dr,role:'60%',key:'d'},{ci:sci,ri:sr,role:'30%',key:'s'},{ci:aci,ri:ar2,role:'10%',key:'a'}].map(wcd).join('')}</div>`;
}

function wcd({ci,ri,role,key}){
  if(ci===null)return`<div class="wc"><div class="wh"><div class="wn">—</div><div class="wr2">${role}</div></div></div>`;
  const col=COLORS[ci],bH=gH(ci,ri),id=S.wm[key]==='dk',im=S.hm==='mo',mr=getMR(S.sp);
  const aF=bT(bH),fi=S.fgInfo[key];
  const sF=S.fg[key]||aF;
  // Build fg options: TW, IB, + palette colours (with ci for ring selection)
  const fo=[{h:TH,n:'TW',ci:TI},{h:IH,n:'IB',ci:II}];
  S.pl.forEach((c,i)=>{if(c!==null){const h=gH(c,im?mr[i]:(S.slotRings[i]!==null?S.slotRings[i]:S.priRi));if(h!==bH&&!fo.find(f=>f.h===h))fo.push({h,n:COLORS[c].n.split(' ')[0],ci:c});}});
  function rw(bg,fg,lb){const r=cr(h2r(bg),h2r(fg)),lv=wl(r),ll=wl(r,true);return`<div class="cw"><div class="cp" style="background:${bg}"><span class="ca" style="color:${fg}">Aa — Sample</span><span class="cb" style="color:${fg}">${lb}</span></div><div class="cm"><span class="cn">${r1(r)}:1</span><span class="lv ${lv}">${lv}</span><span class="lv ${ll}">${ll} lg</span></div></div>`;}
  function sg(mn,dk){if(ci>=24){const b=ci===TI?TH:IH,f=ci===TI?IH:TH;const r=cr(h2r(b),h2r(f));return r>=mn?{b,f,fl:'pair',r}:null;}const rg=AR[ci];if(!dk){for(let b=0;b<=4;b++){const br=h2r(rg[b]);if(cr(br,IB)>=mn)return{b:rg[b],f:IH,fl:'Ivory Black',r:cr(br,IB)};for(let f=18;f>=9;f--){if(cr(br,h2r(rg[f]))>=mn)return{b:rg[b],f:rg[f],fl:RL[f],r:cr(br,h2r(rg[f]))};}};for(let f=18;f>=9;f--){if(cr(TW,h2r(rg[f]))>=mn)return{b:TH,f:rg[f],fl:RL[f],r:cr(TW,h2r(rg[f]))};}}else{for(let b=18;b>=14;b--){const br=h2r(rg[b]);if(cr(br,TW)>=mn)return{b:rg[b],f:TH,fl:'TW',r:cr(br,TW)};for(let f=0;f<=4;f++){if(cr(br,h2r(rg[f]))>=mn)return{b:rg[b],f:rg[f],fl:RL[f],r:cr(br,h2r(rg[f]))};}}for(let f=0;f<=4;f++){if(cr(IB,h2r(rg[f]))>=mn)return{b:IH,f:rg[f],fl:RL[f],r:cr(IB,h2r(rg[f]))};}}return null;}
  function sr(g,lb){if(!g)return`<div style="font-size:var(--sm);color:var(--t3);padding:2px 0">No ${lb} pairing</div>`;return rw(g.b,g.f,g.fl+' '+lb);}
  // NEW: ring strip for fg colour (when fg is a palette colour, not TW/IB)
  const fgRingStrip=fi&&fi.ci<24
    ?`<div class="rs" style="gap:1px;margin-bottom:7px">${AR[fi.ci].map((h,ri2)=>`<div class="rc rp ${ri2===fi.ri?'ra':''}" style="background:${h}" onclick="sFgRi('${key}',${ri2})" title="${RL[ri2]}"></div>`).join('')}</div>`
    :'';
  return`<div class="wc"><div class="wh"><div class="ws" style="background:${bH}"></div><div><div class="wn">${col.n}</div><div class="wr2">${role} · ${RL[ri]}</div></div><div style="margin-left:auto;display:flex;gap:2px"><button class="wt ${!id?'on':''}" onclick="sWM('${key}','lt')">Light</button><button class="wt ${id?'on':''}" onclick="sWM('${key}','dk')">Dark</button></div></div><div class="wb"><div class="fg"><span class="fl2">Foreground</span>${fo.map(f=>`<div class="fw ${sF===f.h?'on':''}" style="background:${f.h}" title="${f.n}" onclick="sFg('${key}','${f.h}',${f.ci})"></div>`).join('')}${sF!==aF?`<button class="b" style="padding:1px 5px;font-size:var(--xs)" onclick="sFg('${key}',null,null)">Auto</button>`:''}</div>${fgRingStrip}${rw(bH,sF,sF===TH?'TW':sF===IH?'IB':'Palette fg')}<div class="wu">vs anchors</div>${rw(bH,TH,'Titanium White')}${rw(bH,IH,'Ivory Black')}<div class="wu">✓ AA (4.5:1)</div>${sr(sg(4.5,id),'AA')}<div class="wu">✓✓ AAA (7:1)</div>${sr(sg(7,id),'AAA')}</div></div>`;
}

function ua(){uW();rSR();rHB();rHG();rST();rWC();}
function sHm(id){if(S.hm===id&&id!==null)S.hm=null;else S.hm=id;if(S.hm==='cu'&&S.pl.every(v=>v===null))S.pl=[S.pri,null,null,null,null];else if(S.hm&&S.hm!=='cu')syn();S.fc=null;S.ri={d:null,s:null,a:null};ua();}
function setSp(v){S.sp=v;document.getElementById('SV').textContent=`${v}× (${v*15}°)`;if(S.hm&&S.hm!=='cu')syn();S.ri={d:null,s:null,a:null};ua();}
function sFs(i){S.fc=S.fc===i?null:i;rHG();}
function sRo(rk,i){S.ro={...S.ro,[rk]:i};S.ri={...S.ri,[rk]:null};rST();rWC();}
function sRi(k,ri){S.ri={...S.ri,[k]:ri};rST();rWC();}
function sVb(v){S.vb=v;rST();rWC();}
// NEW sFgRi: adjust fg ring in WCAG section
function sFgRi(k,ri){if(!S.fgInfo[k])return;S.fgInfo[k].ri=ri;S.fg={...S.fg,[k]:AR[S.fgInfo[k].ci][ri]};rWC();}
// UPDATED sFg: accepts ci to enable ring strip; ci=null for auto
function sFg(k,h,ci){
  S.fg={...S.fg,[k]:h};
  if(ci!=null&&ci<24){
    const prevRi=S.fgInfo[k]&&S.fgInfo[k].ci===ci?S.fgInfo[k].ri:9;
    S.fgInfo={...S.fgInfo,[k]:{ci,ri:prevRi}};
    S.fg={...S.fg,[k]:AR[ci][prevRi]};
  }else{
    S.fgInfo={...S.fgInfo,[k]:null};
  }
  rWC();
}
function sWM(k,m){S.wm={...S.wm,[k]:m};rWC();}
function setM(m){S.wm2=m;document.getElementById('fext').className='b'+(m==='ext'?' on':'');document.getElementById('fzrn').className='b'+(m==='zrn'?' on':'');uW();}
function setT(t){S.tm=t;['all','wrm','col'].forEach((x,i)=>{document.getElementById(['fall','fwrm','fcol'][i]).className='b'+(t===x?' on':'');});uW();}
function tgl(){S.th=S.th==='dk'?'lt':'dk';document.getElementById('A').className=S.th;document.getElementById('tbtn').textContent=S.th==='dk'?'☀ Light':'☾ Dark';}
function ce(ci,ri,lb){if(ci===null)return{label:lb,name:'—'};const h=gH(ci,ri),rt=r1(cr(h2r(TH),h2r(h))),ri2=r1(cr(h2r(IH),h2r(h)));return{label:lb,name:COLORS[ci].n,hex:h,ring:RL[ri],tier:COLORS[ci].tier,vsTW:{ratio:rt,normal:wl(rt),large:wl(rt,true)},vsIB:{ratio:ri2,normal:wl(ri2),large:wl(ri2,true)}};}
function xp(fmt){
  const im=S.hm==='mo',mr=getMR(S.sp),{d,s,a}=S.ro;
  const dci=S.pl[d],sci=S.pl[s],aci=S.pl[a];
  const dr=im?mr[d]:gR('d'),sr=im?mr[s]:gR('s'),ar2=im?mr[a]:gR('a');
  const ac=gH(aci,ar2),va=vib(ac,S.vb);
  const H=HM.find(h=>h.id===S.hm)||HM[0];
  const seen=new Set(),all=[];
  function add(e){if(e&&e.hex&&!seen.has(e.hex)){seen.add(e.hex);all.push(e);}}
  const slR=S.slotRings;
  const fe={...ce(S.pri,S.priRi,'focused'),selectedRing:RL[S.priRi]};
  const pe=S.pl.map((ci,i)=>{if(ci===null)return null;const rk=Object.entries(S.ro).find(([k,v])=>v===i)?.[0];const ri=im?mr[i]:(slR[i]!==null?slR[i]:S.priRi);return{...ce(ci,ri,'palette-'+(i+1)),role:rk||null};}).filter(Boolean);
  const de=ce(dci,dr,'60-dominant'),se2=ce(sci,sr,'30-secondary'),ae=ce(aci,ar2,'10-accent');
  const rv=r1(cr(h2r(TH),h2r(va))),rv2=r1(cr(h2r(IH),h2r(va)));
  const ve={label:'10-accent-vibrant',hex:va,vib:S.vb+'%',vsTW:{ratio:rv,normal:wl(rv),large:wl(rv,true)},vsIB:{ratio:rv2,normal:wl(rv2),large:wl(rv2,true)}};
  const rt=r1(cr(TW,IB)),tw={label:'titanium-white',name:'Titanium White',hex:TH,tier:'anchor',vsIB:{ratio:rt,normal:wl(rt),large:wl(rt,true)}};
  const ri3=r1(cr(IB,TW)),ib={label:'ivory-black',name:'Ivory Black',hex:IH,tier:'anchor',vsTW:{ratio:ri3,normal:wl(ri3),large:wl(ri3,true)}};
  [fe,...pe,de,se2,ae,ve,tw,ib].forEach(add);
  const mx=[];pe.forEach((p1,i)=>pe.slice(i+1).forEach(p2=>{if(p1.hex&&p2.hex){const r=r1(cr(h2r(p1.hex),h2r(p2.hex)));mx.push({pair:`${p1.name}/${p2.name}`,ratio:r,normal:wl(r),large:wl(r,true)});}}));
  const data={date:new Date().toISOString(),harmony:{type:S.hm,label:H.lb,spread:S.sp,spreadDeg:S.sp*15+'°'},filter:{mode:S.wm2,temp:S.tm},focused:fe,palette:pe,sixtyThirtyTen:{dominant:de,secondary:se2,accent:ae,accentVibrant:ve},anchors:{tw,ib},allColours:all,contrastMatrix:mx};
  let blob,name;
  if(fmt==='json'){blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});name='zorn.json';}
  else{const rows=[['label','name','hex','ring','tier','vsTW_ratio','vsTW_norm','vsTW_large','vsIB_ratio','vsIB_norm','vsIB_large']];all.forEach(c=>{rows.push([c.label,c.name||'',c.hex||'',c.ring||'',c.tier||'',c.vsTW?.ratio||'',c.vsTW?.normal||'',c.vsTW?.large||'',c.vsIB?.ratio||'',c.vsIB?.normal||'',c.vsIB?.large||'']);});blob=new Blob([rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n')],{type:'text/csv'});name='zorn.csv';}
  const u=URL.createObjectURL(blob),el=document.createElement('a');el.href=u;el.download=name;document.body.appendChild(el);el.click();document.body.removeChild(el);URL.revokeObjectURL(u);
}
syn();bW();ua();
</script></body></html>
